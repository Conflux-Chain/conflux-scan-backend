openapi: 3.0.0
info:
  title: Conflux Scan Open Api
  description: "Use any http client to fetch data from the ConfluxScan mainnet or testnet.<br/>
  <table>
    <tr>
      <td>Api host</td><td>Net</td><td>Mode</td><td>Scan</td>
    </tr>
    <tr>
      <td><a href='https://api.confluxscan.net/doc'>https://api.confluxscan.net</a></td><td>Mainnet</td><td>Production</td>
      <td><a target='_blank' href='https://confluxscan.io'>https://confluxscan.io</a></td>
    </tr>
    <tr>
      <td><a href='https://api-testnet.confluxscan.net/doc'>https://api-testnet.confluxscan.net</a></td><td>Testnet</td><td>Production</td>
      <td><a target='_blank' href='https://testnet.confluxscan.io'>https://testnet.confluxscan.io</a></td>
    </tr>
  </table>
  Notes:<br/>
  <li>Timestamp is in seconds format.</li>
  <li>Maximum 'skip' is 10,000 when paging.</li>
  <li>Maximum 'limit' is 100 when paging.</li>
  "
  version: 0.0.1
servers:
  - url: ''
    description: 'This server'
#  - url: 'http://localhost:8087/open'
#    description: 'Local server'
paths:
  '/version':
    get:
      tags:
        - 'Server Info'
      description: 'Get server version.'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
  /chain/status:
    get:
      tags:
        - 'Chain'
      description: "Get status of the chain within ${limit} ${intervalType}. When limit is 1
      , the result may be empty because the latest record may have not been produced. So minimum is 2."
      parameters:
        - $ref: '#/components/parameters/sortParam'
        - description: "Indicator calculation period, should be one of minute, hour or day."
          name: intervalType
          in: query
          required: false
          schema:
            type: string
            enum:
              - min
              - hour
              - day
        - name: skip
          in: query
          description: "The number of skipped records, usually it's pageSize * (pageNumber - 1). Maximum 60."
          required: false
          schema:
            type: integer
            default: 0
            maximum: 60
        - name: limit
          in: query
          description: "The number of records displayed on the page. Maximum 60. Minimum 2"
          required: false
          schema:
            type: integer
            maximum: 60
            default: 10
            minimum: 2
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/ChainStatus"
  /account/transactions:
    get:
      tags:
        - 'Transaction'
      description: "Get transactions associated with an account. A transaction with 'from' or 'to' equals to specified account
      is considered as 'associate'. Parameters 'from' and 'to' are [or] logic."
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
#        - $ref: '#/components/parameters/nonceParam'
#        - $ref: '#/components/parameters/txTypeParam'
#        - $ref: '#/components/parameters/needAddressInfoParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/TransactionList"
  '/account/cfx/transfers':
    get:
      description: 'Get cfx transfer records of an account.'
      tags:
        - 'Account'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        #        - $ref: '#/components/parameters/needAddressInfoParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer20List"
  '/account/crc20/transfers':
    get:
      description: 'Get crc20 transfer records of an account.'
      tags:
        - 'Account'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
#        - $ref: '#/components/parameters/needAddressInfoParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer20List"
  '/account/crc721/transfers':
    description: 'Get crc721 transfer records of an account'
    get:
      tags:
        - 'Account'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/tokenIdParam'
#        - $ref: '#/components/parameters/needAddressInfoParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer721List"
  '/account/crc1155/transfers':
    description: 'Get crc1155 transfer records of an account'
    get:
      tags:
        - 'Account'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/tokenIdParam'
#        - $ref: '#/components/parameters/needAddressInfoParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer1155List"
  '/account/tokens':
    get:
      description: 'Get assets held by an account. Some tokens may not show up for some reasons.'
      tags:
        - 'Account'
      parameters:
        - $ref: '#/components/parameters/account'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/AssetsOfAccount"
components:
  schemas:
    Version:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            version:
              type: string
    AddressInfo:
      type: object
      additionalProperties:
        type: object
        properties:
          name:
            type: string
          symbol:
            type: string
          iconUrl:
            type: string
          decimals:
            type: integer
          tokenType:
            type: string
    AssetsOfAccount:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            list:
              type: array
              items:
                properties:
                  name:
                    description: 'Name of the token.'
                    type: string
                  symbol:
                    description: 'Symbol of the token.'
                    type: string
                    example: 'CRC20'
                  decimals:
                    description: 'Decimal of the token, optional.'
                    type: integer
                  contract:
                    description: 'Contract address of the token.'
                    type: string
                    example: 'cfx:acg158kvr8zanb1bs048ryb6rtrhr283ma70vz70tx'
                  iconUrl:
                    description: 'Icon url.'
                    type: string
                    example: 'http://scan-icons.oss-cn-hongkong.aliyuncs.com/testnet/cfxtest%3Aachkx35n7vngfxgrm7akemk3ftzy47t61yk5nn270s.svg'
                  amount:
                    description: 'The token balance of an account, the string is not divided by the token decimal.'
                    type: 'string'
    TransferCfxList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    example: 'cfx:aajj1b1gm7k51mhzm80czcx31kwxrm2f6jxvy30mvk'
                    type: string
                  "to":
                    type: string
                  "amount":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    Transfer20List:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    example: 'cfx:aajj1b1gm7k51mhzm80czcx31kwxrm2f6jxvy30mvk'
                    type: string
                  "to":
                    type: string
                  "amount":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    Transfer721List:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "tokenId":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    Transfer1155List:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "amount":
                    type: string
                  "tokenId":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    ChainStatus:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  blockTime:
                    type: string
                    description: ''
                  tps:
                    type: string
                    description: ''
                  hashRate:
                    type: string
                    description: ''
                  difficulty:
                    type: string
                    description: ''
                  timestamp:
                    type: string
                    description: 'Statistics time, in seconds.'
                  statTime:
                    type: string
                    description: 'Statistics time'
    TransactionList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  "blockPosition":
                    type: integer
                    description: "One epoch may have multiple blocks. It's the position of current block in all blocks."
                  "transactionIndex":
                    type: integer
                    description: "One block may have multiple transactions. It's the position of this transaction in all transactions."
                  "nonce":
                    type: integer
                  "hash":
                    description: 'transaction hash'
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "value":
                    type: string
                    description: 'Amount of cfx, in drip.'
                  "gasPrice":
                    type: string
                  "gasFee":
                    type: string
                  "timestamp":
                    description: "Timestamp in seconds. "
                    type: number
                  "status":
                    type: integer
                  "contractCreated":
                    type: string
                  "method":
                    type: string
                    description: 'method id or method name.'
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
  parameters:
    account:
      name: account
      in: query
      description: "Account address, on testnet, it's like cfxtest:aatmcd6m3e4gjczt9v9d1gca1d77trk3vjr04w5yha,
      on mainnet it's like cfx:aanjcf1esdz50j6zhkm0k60wc7669tfkw28mzudg24"
      required: true
      schema:
        type: string
        example: ''
    from:
      name: from
      in: query
      description: "Account address, on testnet, it's like cfxtest:aatmcd6m3e4gjczt9v9d1gca1d77trk3vjr04w5yha,
      on mainnet it's like cfx:aanjcf1esdz50j6zhkm0k60wc7669tfkw28mzudg24"
      required: false
      schema:
        type: string
        example: ''
    to:
      name: to
      in: query
      description: "Account address, on testnet, it's like cfxtest:aatmcd6m3e4gjczt9v9d1gca1d77trk3vjr04w5yha,
      on mainnet it's like cfx:aanjcf1esdz50j6zhkm0k60wc7669tfkw28mzudg24"
      required: false
      schema:
        type: string
        example: ''
    skipParam:
      name: skip
      in: query
      description: "The number of skipped records, usually it's pageSize * (pageNumber - 1). Maximum 10000."
      required: false
      schema:
        type: integer
        default: 0
        maximum: 10000
    limitParam:
      name: limit
      in: query
      description: "The number of records displayed on the page. Maximum 100."
      required: false
      schema:
        type: integer
        maximum: 100
        default: 10
    contractParam:
      name: contract
      in: query
      description: "Contract address, on testnet, it's like cfxtest:acepe88unk7fvs18436178up33hb4zkuf62a9dk1gv,
      on mainnet it's like cfx:acf2rcsh8payyxpg6xj7b0ztswwh81ute60tsw35j7"
      required: false
      schema:
        type: string
        example: ''
    minEpochNumberParam:
      name: minEpochNumber
      in: query
      required: false
      schema:
        type: integer
    maxEpochNumberParam:
      name: maxEpochNumber
      in: query
      required: false
      schema:
        type: integer
    minTimestampParam:
      description: 'Timestamp in seconds.'
      name: minTimestamp
      in: query
      required: false
      schema:
        type: integer
    maxTimestampParam:
      description: 'Timestamp in seconds.'
      name: maxTimestamp
      in: query
      required: false
      schema:
        type: integer
    nonceParam:
      description: 'Nonce used in a transaction.'
      name: nonce
      in: query
      required: false
      schema:
        type: integer
    tokenIdParam:
      description: "Token id. It's uint256 in solidity. Using string here."
      name: tokenId
      in: query
      required: false
      schema:
        type: string
    txTypeParam:
      description: "Transaction type, incoming or outgoing."
      name: txType
      in: query
      required: false
      schema:
        type: string
        enum:
          - outgoing
          - incoming
    needAddressInfoParam:
      description: "Whether to obtain the detailed information of the address appearing in the returned result."
      name: needAddressInfo
      in: query
      required: false
      schema:
        type: boolean
        default: false
    sortParam:
      description: "Sort in DESC or ASC order. If sorting by custom filed is not supported, epoch and other time sequence fields are applied"
      name: sort
      in: query
      required: false
      schema:
        type: string
        default: 'DESC'
externalDocs:
  description: 'Conflux JSON RPC Docs'
  url: 'https://developer.confluxnetwork.org/docs/conflux-doc/docs/json_rpc'

