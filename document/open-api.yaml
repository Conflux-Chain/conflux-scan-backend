components:
  schemas:
    Version:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            version:
              type: string
    AddressInfo:
      type: object
      additionalProperties:
        type: object
        properties:
          contract:
            type: object
            properties:
              name:
                type: string
                description: "Name of the contract."
              verify:
                type: object
                properties:
                  result:
                    type: integer
                    description: "Verify result of the contract, 1-verified, 0-not verified."
          token:
            type: object
            properties:
              name:
                type: string
                description: "Name of the token."
              symbol:
                type: string
                description: "Symbol of the token."
              decimals:
                type: integer
                description: "Decimal of the token, omit if empty."
              website:
                type: string
                description: "Website  of the token, optional"
              iconUrl:
                type: string
                description: "Icon url, optional"
              tokenType:
                type: string
                description: "Token type, CRC20、CRC721 or CRC1155"
    AssetsOfAccount:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            list:
              type: array
              items:
                properties:
                  contract:
                    description: 'Contract address of the token. Omit if it is native token.'
                    type: string
                  name:
                    description: 'Name of the token.'
                    type: string
                  symbol:
                    description: 'Symbol of the token.'
                    type: string
                    example: 'CFX'
                  decimals:
                    description: 'Decimal of the token, omit if empty.'
                    type: integer
                  type:
                    description: 'Token type, CRC20、CRC721、CRC1155 or native'
                    type: string
                  iconUrl:
                    description: 'Icon url, optional.'
                    type: string
                    example: 'http://scan-icons.oss-cn-hongkong.aliyuncs.com/testnet/xxxxxx.svg'
                  quoteUrl:
                    description: 'The quote url of token, optional.'
                    type: 'string'
                  priceInUSDT:
                    description: 'The price of token in USDT, optional.'
                    type: 'string'
                  amount:
                    description: 'The token/native-token balance of an account, the string is not divided by the token decimal.'
                    type: 'string'
                  stakingAmount:
                    description: 'The staking token/native-token balance of an account, the string is not divided by the token decimal.'
                    type: 'string'
    AccountInfos:
      type: object
      additionalProperties:
        type: object
        properties:
          contract:
            type: object
            properties:
              name:
                type: string
                description: "Name of the contract."
          token:
            type: object
            properties:
              name:
                type: string
                description: "Name of the token."
              symbol:
                type: string
                description: "Symbol of the token."
              decimals:
                type: integer
                description: "Decimal of the token, omit if empty."
              iconUrl:
                type: string
                description: "Icon url, optional"
              website:
                type: string
                description: "Website  of the token, optional"
              tokenType:
                type: string
                description: "Token type, CRC20、CRC721 or CRC1155"
          verification:
            type: object
            properties:
              name:
                type: string
                description: "Name of the verified contract."
          eSpace:
            type: object
            properties:
              address:
                type: string
                description: "ESpace address."
          ens:
            type: object
            properties:
              name:
                type: string
                description: "ENS name."
          nameTag:
            type: object
            properties:
              nameTag:
                type: string
                description: "Name tag."
              website:
                type: string
                description: "Website."
              desc:
                type: string
                description: "Description."
              labels:
                type: array
                description: "Label array."
                items:
                  type: string
                  description: "Label."
              caution:
                type: string
                description: "The caution = 1 when labels contains a caution label. The caution = 0 when others"
