components:
  schemas:
    Version:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            version:
              type: string
    AddressInfo:
      type: object
      additionalProperties:
        type: object
        properties:
          name:
            type: string
          symbol:
            type: string
          iconUrl:
            type: string
          decimals:
            type: integer
          tokenType:
            type: string
    AssetsOfAccount:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            list:
              type: array
              items:
                properties:
                  name:
                    description: 'Name of the token.'
                    type: string
                  symbol:
                    description: 'Symbol of the token.'
                    type: string
                    example: 'CRC20'
                  decimals:
                    description: 'Decimal of the token, optional.'
                    type: integer
                  contract:
                    description: 'Contract address of the token.'
                    type: string
                    example: 'cfx:acg158kvr8zanb1bs048ryb6rtrhr283ma70vz70tx'
                  iconUrl:
                    description: 'Icon url.'
                    type: string
                    example: 'http://scan-icons.oss-cn-hongkong.aliyuncs.com/testnet/cfxtest%3Aachkx35n7vngfxgrm7akemk3ftzy47t61yk5nn270s.svg'
                  amount:
                    description: 'The token balance of an account, the string is not divided by the token decimal.'
                    type: 'string'
    TransferCfxList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    example: 'cfx:aajj1b1gm7k51mhzm80czcx31kwxrm2f6jxvy30mvk'
                    type: string
                  "to":
                    type: string
                  "amount":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    Transfer20List:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    example: 'cfx:aajj1b1gm7k51mhzm80czcx31kwxrm2f6jxvy30mvk'
                    type: string
                  "to":
                    type: string
                  "amount":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    Transfer721List:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "tokenId":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    Transfer1155List:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "amount":
                    type: string
                  "tokenId":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    MiningStat:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  blockTime:
                    type: string
                    description: ''
                  hashRate:
                    type: string
                    description: ''
                  difficulty:
                    type: string
                    description: ''
#                  timestamp:
#                    type: string
#                    description: 'Statistics time, in seconds.'
                  statTime:
                    type: string
                    description: 'Statistics time, UTC.'
    TransactionList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  "blockPosition":
                    type: integer
                    description: "One epoch may have multiple blocks. It's the position of current block in all blocks."
                  "transactionIndex":
                    type: integer
                    description: "One block may have multiple transactions. It's the position of this transaction in all transactions."
                  "nonce":
                    type: integer
                  "hash":
                    description: 'transaction hash'
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "value":
                    type: string
                    description: 'Amount of cfx, in drip.'
                  "gasPrice":
                    type: string
                  "gasFee":
                    type: string
                  "timestamp":
                    description: "Timestamp in seconds. "
                    type: number
                  "status":
                    type: integer
                  "contractCreated":
                    type: string
                  "method":
                    type: string
                    description: 'method id or method name.'
