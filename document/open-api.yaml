openapi: 3.0.0
info:
  title: Conflux Scan Open Api
  description: "Use any http client to fetch data from the ConfluxScan mainnet or testnet.<br/>
  <table>
    <tr>
      <td>Api host</td><td>Net</td><td>Mode</td><td>Scan</td>
    </tr>
    <tr>
      <td><a href='https://api.confluxscan.net/doc'>https://api.confluxscan.net</a></td><td>Mainnet</td><td>Production</td>
      <td><a target='_blank' href='https://confluxscan.io'>https://confluxscan.io</a></td>
    </tr>
    <tr>
      <td><a href='https://api-testnet.confluxscan.net/doc'>https://api-testnet.confluxscan.net</a></td><td>Testnet</td><td>Production</td>
      <td><a target='_blank' href='https://testnet.confluxscan.io'>https://testnet.confluxscan.io</a></td>
    </tr>
  </table>
  Notes:<br/>
  <li>Timestamp is in seconds format.</li>
  <li>Maximum 'skip' is 10,000 when paging.</li>
  <li>Maximum 'limit' is 100 when paging.</li>
  "
  version: 0.0.1
servers:
  - url: ''
    description: 'This server'
#  - url: 'http://localhost:8087/open'
#    description: 'Local server'
paths:
  '/version':
    get:
      tags:
        - 'Server Info'
      description: 'Get server version.'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
  /account/transactions:
    get:
      tags:
        - 'Account'
      description: "Get transactions associated with an account. A transaction with 'from' or 'to' equals to specified account
      is considered as 'associate'. Parameters 'from' and 'to' are [or] logic."
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
#        - $ref: '#/components/parameters/nonceParam'
#        - $ref: '#/components/parameters/txTypeParam'
#        - $ref: '#/components/parameters/needAddressInfoParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/TransactionList"
  '/account/cfx/transfers':
    get:
      description: 'Get cfx transfer records of an account.'
      tags:
        - 'Account'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/from'
