openapi: 3.0.0
info:
  title: Conslux Scan Open Api
  description: Conslux Scan Open Api
  version: 1.0.0
servers:
  - url: 'http://localhost:8087/open'
  - url: 'https://baidu.com'
  - url: 'http://testnet-scanapi.confluxnetwork.org'
paths:
  '/':
    get:
      responses:
        200:
          description: 'Welcome of Conflux scan open api.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Welcome'
  /transaction/account:
    get:
      parameters:
        - $ref: '#/components/parameters/account'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/TransactionList"
  '/transfer20/account':
    get:
      parameters:
        - $ref: '#/components/parameters/account'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/TransactionList"
  '/transfer721/account':
    get:
  '/transfer1155/account':
    get:
  '/account/assert':
    get:
components:
  schemas:
    Welcome:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
    TransferList:
      type: object
        properties:
          code:
            type: integer
          message:
            type: string
          data:
            type: array
            items:
              properties:
                epochNumber:
                  type: integer
                  format: int64
                "transactionHash":
                  type: string
                "from":
                  type: string
                "to":
                  type: string
                "value":
                  type: string
                "address":
                  type: string
                "timestamp":
                  type: integer
                "transactionLogIndex":
                  type: integer
                "transferType":
                  type: string
                  example: 'ERC20'
    TransactionList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: array
          items:
            properties:
              epochNumber:
                type: integer
                format: int64
              "blockHash":
                type: string
              "blockPosition":
                type: integer
              "transactionIndex":
                type: integer
              "nonce":
                type: integer
              "hash":
                type: string
              "from":
                type: string
              "to":
                type: string
              "value":
                type: string
              "gasPrice":
                type: string
              "gasFee":
                type: string
              "timestamp":
                type: number
              "status":
                type: integer
              "contractCreated":
                type: string
              "method":
                type: string
  parameters:
    account:      # Can be referenced via '#/components/parameters/offsetParam'
      name: account
      in: query
      description: 'account/address'
      required: true
      schema:
        type: string
        example: 'cfx:aakcj5jhr4v24zuj5tukj2z2uy8gges1e2fzajsf7w'



#https://swagger.io/docs/specification/components/:
