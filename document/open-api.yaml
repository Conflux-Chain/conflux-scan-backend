openapi: 3.0.0
info:
  title: Conflux Scan Open Api
  description: "Use any http client to fetch data from the ConfluxScan mainnet or testnet.<br/>
  <h3>Endpoints:</h3>
  <table>
    <tr>
      <td>API Host</td><td>Net</td><td>Mode</td><td>Scan</td>
    </tr>
    <tr>
      <td><a href='https://api.confluxscan.__tld__/doc'>https://api.confluxscan.__tld__</a></td><td>Mainnet Core</td><td>Production</td>
      <td><a target='_blank' href='https://confluxscan.__tld__'>https://confluxscan.__tld__</a></td>
    </tr>
    <tr>
      <td><a href='https://evmapi.confluxscan.__tld__/doc'>https://evmapi.confluxscan.__tld__</a></td><td>Mainnet eSpace</td><td>Production</td>
      <td><a target='_blank' href='https://evm.confluxscan.__tld__'>https://evm.confluxscan.__tld__</a></td>
    </tr>
    <tr>
      <td><a href='https://api-testnet.confluxscan.__tld__/doc'>https://api-testnet.confluxscan.__tld__</a></td><td>Testnet Core</td><td>Production</td>
      <td><a target='_blank' href='https://testnet.confluxscan.__tld__'>https://testnet.confluxscan.__tld__</a></td>
    </tr>
    <tr>
      <td><a href='https://evmapi-testnet.confluxscan.__tld__/doc'>https://evmapi-testnet.confluxscan.__tld__</a></td><td>Testnet eSpace</td><td>Production</td>
      <td><a target='_blank' href='https://evmtestnet.confluxscan.__tld__'>https://evmtestnet.confluxscan.__tld__</a></td>
    </tr>
  </table>
  
  <h3>Notes:</h3>
  <li>Timestamp is in seconds format.</li>
  <li>Maximum 'skip' is 10,000 when paging.</li>
  <li>Maximum 'limit' is 100 when paging.</li>
  <li>The block list, transaction list, CFX transfer list and token transfer list  querying by account dimension can only be viewed the last 20,000 records due to data prune.</li>
  
  <h3>Rate Limit:</h3>
  Reference for various API tiers and their rate limits
  <table>
    <tr>
    <td>API Tier</td>
    <td>Price</td>
    <td>Rate Limit</td>
    </tr>
    <tr>
    <td>Free</td>
    <td>$0</td>
    <td>5 calls/second, up to 100,000 calls/day</td>
    </tr>
    <tr>
    <td>Standard</td>
    <td>$150/mo</td>
    <td>20 calls/second, up to 500,000 calls/day</td>
    </tr>
    <tr>
    <td>Enterprise</td>
    <td>For details, please email bd@confluxnetwork.org</td>
    <td>Customize according to demand</td>
    </tr>
  </table>
  
  <h3>SDK:</h3>
  <table>
    <tr>
    <td>Space</td>
    <td>Link</td>
    </tr>
    <tr>
    <td>Core</td>
    <td><a target='_blank' href='https://www.npmjs.com/package/@conflux-lib/openapi-sdk-core'>openapi-sdk-core</a></td>
    </tr>
    <tr>
    <td>EVM</td>
    <td><a target='_blank' href='https://www.npmjs.com/package/@conflux-lib/openapi-sdk-evm'>openapi-sdk-evm</a></td>
    </tr>
  </table>
  "
  version: 0.0.1
servers:
  - url: ''
    description: 'This server'
#  - url: 'http://localhost:8087/open'
#    description: 'Local server'
paths:
  '/version':
    get:
      tags:
        - 'Server Info'
      description: 'Get server version.'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
  /account/transactions:
    get:
      tags:
        - 'Accounts'
      description: "Get transactions associated with an account. A transaction with 'from' or 'to' equals to specified account
      is considered as 'associate'. Parameters 'from' and 'to' are [or] logic."
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/withInputParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/TransactionList"
  '/account/cfx/transfers':
    get:
      description: 'Get cfx transfer records of an account.'
      tags:
        - 'Accounts'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/TransferCfxList"
  '/account/crc20/transfers':
    get:
      description: 'Get crc20 transfer records of an account.'
      tags:
        - 'Accounts'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer20List"
  '/account/crc721/transfers':
    description: 'Get crc721 transfer records of an account'
    get:
      tags:
        - 'Accounts'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/tokenIdParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer721List"
  '/account/crc1155/transfers':
    description: 'Get crc1155 transfer records of an account'
    get:
      tags:
        - 'Accounts'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/tokenIdParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer1155List"
  '/account/crc3525/transfers':
    description: 'Get crc3525 transfer records of an account'
    get:
      tags:
        - 'Accounts'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/tokenIdParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer3525List"
  '/account/transfers':
    description: 'Get all transfer records (includes: cfx transfer, crc20/crc721/crc1155 transfer) of an account'
    get:
      tags:
        - 'Accounts'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/cursorParamWithoutMaximum'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/tokenIdParam'
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/transferTypeParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/TransferListWithCursor"
  '/account/approvals':
    description: 'Get token approvals of an account'
    get:
      tags:
        - 'Accounts'
      parameters:
        - $ref: '#/components/parameters/account'
        - name: tokenType
          in: query
          required: false
          schema:
            type: string
            default: ''
            enum:
              - ERC20
              - ERC721
              - ERC1155
        - name: byTokenId
          in: query
          description: Whether to query each NFT token id, only valid for ERC721.
          required: false
          schema:
            type: string
            default: false
            enum:
              - true
              - false
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Approvals"
  '/account/tokens':
    get:
      description: 'Get assets held by an account. Some tokens may not show up for some reasons.'
      tags:
        - 'Accounts'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParamWithoutMaximum'
        - $ref: '#/components/parameters/limitParamWithMax100'
        - $ref: '#/components/parameters/tokenTypeParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/AssetsOfAccount"
  '/account/infos':
    get:
      description: "Get the accounts' name information. Supports up to 100 account at a time."
      tags:
        - 'Accounts'
      parameters:
        - $ref: '#/components/parameters/accountArrayParam'
        - $ref: '#/components/parameters/withContractInfo'
        - $ref: '#/components/parameters/withNameTagInfo'
        - $ref: '#/components/parameters/withByte32NameTagInfo'
        - $ref: '#/components/parameters/withESpaceInfo'
        - $ref: '#/components/parameters/withENSInfo'
        - $ref: '#/components/parameters/withProxyImplInfo'
        - $ref: '#/components/parameters/realtimeProxyImpl'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/AccountInfos"
  '/contract/getabi':
    get:
      tags:
        - 'Contracts'
      description: 'Get Contract ABI for Verified Contract Source Codes'
      parameters:
        - $ref: '#/components/parameters/addressMust'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'
  '/contract/getsourcecode':
    get:
      tags:
        - 'Contracts'
      description: 'Get Contract Source Code for Verified Contract Source Codes'
      parameters:
        - $ref: '#/components/parameters/addressMust'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractInfo'
  '/contract/getContractCreation':
    get:
      tags:
        - 'Contracts'
      description: "Returns a contract's deployer address and transaction hash it was created, up to 5 at a time."
      parameters:
        - $ref: '#/components/parameters/contractAddressesParam'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractCreationInfo'
  '/contract/verifysourcecode':
    post:
      tags:
        - 'Contracts'
      requestBody:
        description: 'Verify Source Code - Source Code Submission Gist'
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifySourcecode'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'
  '/contract/checkverifystatus':
    get:
      tags:
        - 'Contracts'
      description: 'Verify Source Code - Check Source Code Verification Submission Status'
      parameters:
        - $ref: '#/components/parameters/guidMust'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractInfo'
  '/contract/verifyproxycontract':
    get:
      tags:
        - 'Contracts'
      description: 'Verifying Proxy Contract using cURL'
      parameters:
        - $ref: '#/components/parameters/addressMust'
        - $ref: '#/components/parameters/expectedimplementation'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'
  '/contract/checkproxyverification':
    get:
      tags:
        - 'Contracts'
      description: 'Checking Proxy Contract Verification Submission Status using cURL'
      parameters:
        - $ref: '#/components/parameters/guidMust'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'
  '/contract/verified':
    get:
      tags:
        - Contracts
      summary: List verified contracts with cursor pagination
      description: >
        Returns a cursor-paginated list of verified contracts.
        Rules:
        1. Arbitrary page navigation is not supported.
        2. Clients must use the `nextCursor` returned by the server.
      parameters:
        - $ref: '#/components/parameters/cursorParamWithoutMaximum'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        '200':
          description: Cursor-paginated verified contracts list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationListByCursor'
  '/contract/verified/latest':
    get:
      tags:
        - Contracts
      summary: List verified contracts with filter pagination
      description: >
        Returns a filter-paginated list of verified contracts.
      parameters:
        - in: query
          name: compiler
          description: "Contract compiler (solc or vyper) "
          required: false
          schema:
            type: string
        - in: query
          name: contractName
          description: "The contract name"
          required: false
          schema:
            type: string
        - in: query
          name: compilerVersion
          description: "Compiler version used
                        \nfor solc compiler, such as v0.8.24+commit.e11b9ed9
                        \nfor vyper compiler, such as vyper:0.4.0"
          required: false
          schema:
            type: string
        - in: query
          name: licenseType
          description: "Valid codes 1-14 where
                              1.  No License (None)
                              2.  The Unlicense (Unlicense)
                              3. 	MIT License (MIT)
                              4. 	GNU General Public License v2.0 (GNU GPLv2)
                              5. 	GNU General Public License v3.0 (GNU GPLv3)
                              6. 	GNU Lesser General Public License v2.1 (GNU LGPLv2.1)
                              7. 	GNU Lesser General Public License v3.0 (GNU LGPLv3)
                              8. 	BSD 2-clause 'Simplified' license (BSD-2-Clause)
                              9. 	BSD 3-clause 'New' Or 'Revised' license* (BSD-3-Clause)
                              10. Mozilla Public License 2.0 (MPL-2.0)
                              11. Open Software License 3.0 (OSL-3.0)
                              12. Apache 2.0 (Apache-2.0)
                              13. GNU Affero General Public License (GNU AGPLv3)
                              14. Business Source License (BSL 1.1)"
          required: false
          schema:
            type: string
        - in: query
          name: contractAddress
          description: "The contract address"
          required: false
          schema:
            type: string
        - in: query
          name: deployerAddress
          description: "The contract deployer address"
          required: false
          schema:
            type: string
        - in: query
          description: "If the contract has nametag, the value is true/false."
          name: hasNametag
          required: false
          schema:
            type: string
        - in: query
          description: "The field used for sorting. The value is verified_time or txn_volume"
          name: sortField
          required: false
          schema:
            type: string
            default: 'verified_time'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/skipParamWithoutMaximum'
        - $ref: '#/components/parameters/limitParam'
      responses:
        '200':
          description: Filter-paginated verified contracts list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationListByFilter'
#  '/token/tokeninfo':
#    get:
#      tags:
#        - 'Tokens'
#      description: 'Get Token Info by ContractAddress'
#      parameters:
#        - $ref: '#/components/parameters/contractParam'
#      responses:
#        200:
#          description: ''
#          content:
#            application/json:
#              schema:
#                $ref: '#/components/schemas/TokenInfo'
  '/token/tokeninfos':
    get:
      tags:
        - 'Tokens'
      description: 'Get Token Info by contract addresses. Supports up to 30 tokens at a time.'
      parameters:
        - $ref: '#/components/parameters/contractArrayParam'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenInfos'
  /nft/balances:
    get:
      tags:
        - 'NFT Assets'
      description: "Get balances of NFT assets for account address."
      parameters:
        - $ref: '#/components/parameters/ownerParamMust'
        - $ref: '#/components/parameters/skipParamWithoutMaximum'
        - $ref: '#/components/parameters/limitParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/NFTBalanceList"
  /nft/tokens:
    get:
      tags:
        - 'NFT Assets'
      description: "Get token id array of specified NFT contract for account address.
                   \nAt least one of the parameters 'contract' and 'owner' is required."
      parameters:
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/ownerParam'
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/sortFieldParam'
        - $ref: '#/components/parameters/cursorParamWithoutMaximum'
        - $ref: '#/components/parameters/skipParamWithoutMaximum'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/withBriefParam'
        - $ref: '#/components/parameters/withMetadataParam'
        - $ref: '#/components/parameters/suppressMetadataErrorParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/NFTTokenList"
  /nft/preview:
    get:
      tags:
        - 'NFT Assets'
      description: "View the NFT for the specified contract address and tokenID."
      parameters:
        - $ref: '#/components/parameters/contractParamMust'
        - $ref: '#/components/parameters/tokenIdParamMust'
        - $ref: '#/components/parameters/withMetadataParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/NFTPreview"
  /nft/fts:
    get:
      tags:
        - 'NFT Assets'
      description: "Search the NFT by NFT name and/or contract address."
      parameters:
        - $ref: '#/components/parameters/nameParamMust'
        - $ref: '#/components/parameters/contractParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/NFTTokenFtsList"
  /nft/owners:
    get:
      tags:
        - 'NFT Assets'
      description: "Get a list of owners for a NFT or a NFT collection. The owners are sorted by transfer timestamp with ascending direction"
      parameters:
        - $ref: '#/components/parameters/contractParamMust'
        - $ref: '#/components/parameters/tokenIdParam'
        - $ref: '#/components/parameters/cursorParamWithoutMaximum'
        - $ref: '#/components/parameters/limitParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/NFTOwnerList"
  /nft/transfers:
    get:
      tags:
        - 'NFT Assets'
      description: "Get a list of transfers for a NFT"
      parameters:
        - $ref: '#/components/parameters/contractParamMust'
        - $ref: '#/components/parameters/tokenIdParam'
        - $ref: '#/components/parameters/cursorParamWithoutMaximum'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/TransferList"
  /util/decode/method:
    get:
      tags:
        - 'Utils'
      description: "Decode the data of the transaction, where the `to` address of the transaction is the verified contract. Supports up to 10 transactions at a time."
      parameters:
        - $ref: '#/components/parameters/hashesParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/DecodedMethod"
  /util/decode/method/raw:
    get:
      tags:
        - 'Utils'
      description: "Decode the data of the raw transaction, where the `to` address of the transaction is the verified contract. Supports up to 10 transactions at a time."
      parameters:
        - $ref: '#/components/parameters/contractsParam'
        - $ref: '#/components/parameters/inputsParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/DecodedMethodRaw"
  /statistics/supply:
    get:
      tags:
        - 'Statistics'
      description: "Return supply info about CFX on Conflux Network.
                    \ntotalIssued: Total issued balance in Drip,
                    \ntotalCirculating: Total circulating balance in Drip,
                    \ntotalStaking: Total staking balance in Drip,
                    \ntotalCollateral: Total collateral balance in Drip,
                    \nnullAddressBalance: Zero address's balance in Drip,
                    \ntwoYearUnlockBalance: Two year unlock address's balance in Drip,
                    \nfourYearUnlockBalance: Four year unlock address's balance in Drip."
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketStat'
  /statistics/mining:
    get:
      tags:
        - 'Statistics'
      description: "Get statistics of mining within ${limit} ${intervalType}."
      parameters:
