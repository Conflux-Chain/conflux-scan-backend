components:
  schemas:
    Version:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            version:
              type: string
    AddressInfo:
      type: object
      additionalProperties:
        type: object
        properties:
          contract:
            type: object
            properties:
              name:
                type: string
                description: "Name of the contract."
              verify:
                type: object
                properties:
                  result:
                    type: integer
                    description: "Verify result of the contract, 1-verified, 0-not verified."
          token:
            type: object
            properties:
              name:
                type: string
                description: "Name of the token."
              symbol:
                type: string
                description: "Symbol of the token."
              decimals:
                type: integer
                description: "Decimal of the token, omit if empty."
              website:
                type: string
                description: "Website  of the token, optional"
              iconUrl:
                type: string
                description: "Icon url, optional"
              tokenType:
                type: string
                description: "Token type, CRC20、CRC721 or CRC1155"
    AssetsOfAccount:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            list:
              type: array
              items:
                properties:
                  name:
                    description: 'Name of the token.'
                    type: string
                  symbol:
                    description: 'Symbol of the token.'
                    type: string
                    example: 'CFX'
                  type:
                    description: 'Token type, CRC20、CRC721 or CRC1155'
                    type: string
                  decimals:
                    description: 'Decimal of the token, omit if empty.'
                    type: integer
                  contract:
                    description: 'Contract address of the token.'
                    type: string
                  iconUrl:
                    description: 'Icon url,optional.'
                    type: string
                    example: 'http://scan-icons.oss-cn-hongkong.aliyuncs.com/testnet/xxxxxx.svg'
                  amount:
                    description: 'The token balance of an account, the string is not divided by the token decimal.'
                    type: 'string'
                  priceInUSDT:
                    description: 'The price of token in USDT,optional.'
                    type: 'string'
                  quoteUrl:
                    description: 'The quote url of token,optional.'
                    type: 'string'
    TokenInfo:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        result:
          type: object
          properties:
            contractAddress:
              type: string
            tokenName:
              type: string
            symbol:
              type: string
            divisor:
              type: string
            tokenType:
              type: string
            totalSupply:
              type: string
            blueCheckmark:
              type: string
            description:
              type: string
            website:
              type: string
            email:
              type: string
            blog:
              type: string
            reddit:
              type: string
            slack:
              type: string
            facebook:
              type: string
            twitter:
              type: string
            bitcointalk:
              type: string
            github:
              type: string
            telegram:
              type: string
            wechat:
              type: string
            linkedin:
              type: string
            discord:
              type: string
            whitepaper:
              type: string
    TransferCfxList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  from:
                    type: string
                  to:
                    type: string
                  amount:
                    type: string
                  timestamp:
                    type: integer
