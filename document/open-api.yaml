openapi: 3.0.0
info:
  title: Conflux Scan Open Api
  description: "Use any http client to fetch data from Conflux Scan under mainnet or testnet.<br/>
  <table>
    <tr>
      <td>Api host</td><td>Net</td><td>Mode</td><td>Scan</td>
    </tr>
    <tr>
      <td><a href='https://api.confluxscan.io/doc'>https://api.confluxscan.io</a></td><td>Mainnet</td><td>Production</td>
      <td><a target='_blank' href='https://confluxscan.io'>https://confluxscan.io</a></td>
    </tr>
    <tr>
      <td><a href='https://api-testnet.confluxscan.io/doc'>https://api-testnet.confluxscan.io</a></td><td>Testnet</td><td>Production</td>
      <td><a target='_blank' href='https://testnet.confluxscan.io'>https://testnet.confluxscan.io</a></td>
    </tr>
  </table>
  "
  version: 1.0.0
servers:
  - url: ''
    description: 'This server'
  - url: 'http://localhost:8087/open'
    description: 'Local server'
paths:
  '/':
    get:
      tags:
        - 'Developer tools'
      description: 'Test the network works correctly.'
      responses:
        200:
          description: 'Welcome of Conflux scan open api.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Welcome'
  /transaction/account:
    get:
      tags:
        - 'Transaction'
      description: "Get transactions associated with an account. A transaction with 'from' or 'to' equals to specified account
      is considered as 'associate'. Parameters 'from' and 'to' are [or] logic."
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/TransactionList"
  '/transfer20/account':
    get:
      description: 'Get erc20 transfer records of an account.'
      tags:
        - 'ERC20 transfer'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer20List"
  '/transfer721/account':
    description: 'Get erc721 transfer records of an account'
    get:
      tags:
        - 'ERC721 transfer'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/tokenIdParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer721List"
  '/transfer1155/account':
    description: 'Get erc1155 transfer records of an account'
    get:
      tags:
        - 'ERC1155 transfer'
      parameters:
        - $ref: '#/components/parameters/account'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/minEpochNumberParam'
        - $ref: '#/components/parameters/maxEpochNumberParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/tokenIdParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer1155List"
  '/account/assert':
    get:
      description: 'Get asserts hold by an account. Some tokens will not show up for some reasons'
      tags:
        - 'Account'
      parameters:
        - $ref: '#/components/parameters/account'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/AssertsOfAccount"
components:
  schemas:
    Welcome:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
    AssertsOfAccount:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            list:
                type: array
                items:
                  properties:
                    name:
                      description: 'Name of the token'
                      type: string
                    symbol:
                      description: 'symbol of the token'
                      type: string
                    decimals:
                      description: 'Decimals of the token, if has'
                      type: integer
                    base32:
                      description: 'Address of the token'
                      type: integer
                      example: 'cfx:acg158kvr8zanb1bs048ryb6rtrhr283ma70vz70tx'
                    icon:
                      description: 'Icon url.'
                      type: string
                      example: 'http://confluxscan.io/stat/cfx:acg158kvr8zanb1bs048ryb6rtrhr283ma70vz70tx..svg'
                    balance:
                      description: 'Balance of the account of one token, not divided by decimals of the token.'
                      type: 'string'
    Transfer20List:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    example: 'cfx:aajj1b1gm7k51mhzm80czcx31kwxrm2f6jxvy30mvk'
                    type: string
                  "to":
                    type: string
                  "value":
                    type: string
                  timestamp:
                    type: integer
                  transactionLogIndex:
                    type: integer
                  transferType:
                    type: string
                    example: 'ERC20'
    Transfer721List:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "tokenId":
                    type: string
                  timestamp:
                    type: integer
                  transactionLogIndex:
                    type: integer
                  transferType:
                    type: string
                    example: 'ERC721'
    Transfer1155List:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "value":
                    type: string
                  "tokenId":
                    type: string
                  timestamp:
                    type: integer
                  transactionLogIndex:
                    type: integer
                  transferType:
                    type: string
                    example: 'ERC1155'
    TransactionList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  "blockHash":
                    type: string
                  "blockPosition":
                    type: integer
                  "transactionIndex":
                    type: integer
                  "nonce":
                    type: integer
                  "hash":
                    description: 'transaction hash'
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "value":
                    type: string
                  "gasPrice":
                    type: string
                  "gasFee":
                    type: string
                  "timestamp":
                    type: number
                  "status":
                    type: integer
                  "contractCreated":
                    type: string
                  "method":
                    type: string
  parameters:
    account:
      name: account
      in: query
      description: "account/address, on testnet, it's like cfxtest:aatmcd6m3e4gjczt9v9d1gca1d77trk3vjr04w5yha,
      on mainnet it's like cfx:aanjcf1esdz50j6zhkm0k60wc7669tfkw28mzudg24"
      required: true
      schema:
        type: string
        example: ''
    from:
      name: from
      in: query
      description: "account/address, on testnet, it's like cfxtest:aatmcd6m3e4gjczt9v9d1gca1d77trk3vjr04w5yha,
      on mainnet it's like cfx:aanjcf1esdz50j6zhkm0k60wc7669tfkw28mzudg24"
      required: false
      schema:
        type: string
        example: ''
    to:
      name: to
      in: query
      description: "account/address, on testnet, it's like cfxtest:aatmcd6m3e4gjczt9v9d1gca1d77trk3vjr04w5yha,
      on mainnet it's like cfx:aanjcf1esdz50j6zhkm0k60wc7669tfkw28mzudg24"
      required: false
      schema:
        type: string
        example: ''
    skipParam:
      name: skip
      in: query
      description: "Skip how many records, usually it's pageSize * (pageNumber - 1). Maximum 10000."
      required: false
      schema:
        type: integer
        default: 0
        maximum: 10000
    limitParam:
      name: limit
      in: query
      description: "How many records in one page. Maximum 100."
      required: false
      schema:
        type: integer
        maximum: 100
        default: 10
    contractParam:
      name: contract
      in: query
      description: "contract/address, on testnet, it's like cfxtest:acepe88unk7fvs18436178up33hb4zkuf62a9dk1gv,
      on mainnet it's like cfx:acf2rcsh8payyxpg6xj7b0ztswwh81ute60tsw35j7"
      required: false
      schema:
        type: string
        example: ''
    minEpochNumberParam:
      name: minEpochNumber
      in: query
      required: false
      schema:
        type: integer
    maxEpochNumberParam:
      name: maxEpochNumber
      in: query
      required: false
      schema:
        type: integer
    minTimestampParam:
      description: 'Timestamp in seconds'
      name: minTimestamp
      in: query
      required: false
      schema:
        type: integer
    maxTimestampParam:
      description: 'Timestamp in seconds'
      name: maxTimestamp
      in: query
      required: false
      schema:
        type: integer
    tokenIdParam:
      description: "Token id. It's uint256 in solidity. Using string here."
      name: maxTimestamp
      in: query
      required: false
      schema:
        type: string
    sortParam:
      description: "Sort in DESC or ASC order. If sort by customized filed is not supported, epoch and other time sequence fields are used."
      name: sort
      in: query
      required: false
      schema:
        type: string
        default: 'DESC'
externalDocs:
  description: 'Conflux JSON RPC Docs'
  url: 'https://developer.confluxnetwork.org/docs/conflux-doc/docs/json_rpc'

#https://swagger.io/docs/specification/components/:
