          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "fromTokenId":
                    type: string
                    description: "field for TransferValue event"
                  "toTokenId":
                    type: string
                    description: "field for TransferValue event"
                  "event":
                    type: string
                    description: "event name, TransferValue or Transfer"
                  "amount":
                    type: string
                  "tokenId":
                    type: string
                    description: "field for Transfer event"
                  "slot":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    Approvals:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  value:
                    description: "This field has different meanings according to different situations.
                                For CRC20, it is the approval amount. For CRC1155 it is the `ApprovalForAll` flag.
                                 For CRC721, it is the `ApprovalForAll` flag or the `Approval` tokenId, depending on the `type` field."
                    type: string
                  approvalType:
                    description: "Approval type, could be: `Approval` or `ApprovalForAll`."
                    type: string
                  balance:
                    description: "Token balance for CRC20"
                    type: string
                  contract:
                    type: string
                  spenderName:
                    type: string
                  spender:
                    type: string
                  tokenInfo:
                    type: object
                    properties:
                      name:
                        type: string
                      symbol:
                        type: string
                      base32:
                        type: string
                      iconUrl:
                        type: string
                      type:
                        type: string
                      decimals:
                        type: integer
    TransferList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
#            next:
#              description: A cursor to retrieve the next page
#              type: string
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                    description: "Epoch Number"
                  transactionHash:
                    type: string
                    description: "Transaction Hash"
                  "from":
                    type: string
                    description: "Account address, on testnet, it's like cfxtest:aatmcd6m3e4gjczt9v9d1gca1d77trk3vjr04w5yha,
                    on mainnet it's like cfx:aanjcf1esdz50j6zhkm0k60wc7669tfkw28mzudg24"
                  "to":
                    type: string
                    description: "Account address, on testnet, it's like cfxtest:aatmcd6m3e4gjczt9v9d1gca1d77trk3vjr04w5yha,
                    on mainnet it's like cfx:aanjcf1esdz50j6zhkm0k60wc7669tfkw28mzudg24"
                  "amount":
                    type: string
                    description: "The CFX value or token amount in the transfer, the string is not divided by the CFX/token decimal"
                  "tokenId":
                    type: string
                    description: "The token id in CRC721/CRC1155 transfer, otherwise it is 0"
                  timestamp:
                    type: integer
                    description: "Timestamp in seconds"
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    MiningStat:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
