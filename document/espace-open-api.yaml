        action:
          type: string
          required: true
          description: "request action"
          default: 'verifysourcecode'
        contractaddress:
          type: string
          required: true
          description: "Contract Address starts with 0x... "
        sourceCode:
          type: string
          required: true
          description: "Contract Source Code (Flattened if necessary)"
        codeformat:
          type: string
          required: false
          description: "only support 'solidity-single-file' format"
          default: 'solidity-single-file'
        contractname:
          type: string
          required: true
          description: "contract name"
        compilerversion:
          type: string
          required: true
          description: "compiler version"
        optimizationUsed:
          type: string
          required: true
          description: "0 = No Optimization, 1 = Optimization used (applicable when codeformat=solidity-single-file)"
          default: 0
        runs:
          type: string
          required: true
          description: "set to 200 as default unless otherwise  (applicable when codeformat=solidity-single-file) "
          default: 200
        constructorArguements:
          type: string
          required: false
          description: "if applicable"
          default: ''
        evmversion:
          type: string
          required: false
          description: "leave blank for compiler default, homestead, tangerineWhistle, spuriousDragon, byzantium, constantinople, petersburg, istanbul (applicable when codeformat=solidity-single-file)"
          default: 'istanbul'
        licenseType:
          type: string
          required: true
          description: "Valid codes 1-14 where
                              1.  No License (None)
                              2.  The Unlicense (Unlicense)
