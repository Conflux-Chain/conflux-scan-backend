        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startblock'
        - $ref: '#/components/parameters/endblock'
        - $ref: '#/components/parameters/sort'
      responses:
