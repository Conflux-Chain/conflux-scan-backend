openapi: 3.0.0
info:
  title: Conflux Scan Open Api
  description: "Use any http client to fetch data from the ConfluxScan mainnet or testnet.<br/>
  <table>
    <tr>
      <td>Api host</td><td>Net</td><td>Mode</td><td>Scan</td>
    </tr>
    <tr>
      <td><a href='https://api.confluxscan.net/doc'>https://api.confluxscan.net</a></td><td>Mainnet Core</td><td>Production</td>
      <td><a target='_blank' href='https://confluxscan.io'>https://confluxscan.io</a></td>
    </tr>
    <tr>
      <td><a href='https://evmapi.confluxscan.net/doc'>https://evmapi.confluxscan.net</a></td><td>Mainnet eSpace</td><td>Production</td>
      <td><a target='_blank' href='https://evm.confluxscan.io'>https://evm.confluxscan.io</a></td>
    </tr>
    <tr>
      <td><a href='https://api-testnet.confluxscan.net/doc'>https://api-testnet.confluxscan.net</a></td><td>Testnet Core</td><td>Production</td>
      <td><a target='_blank' href='https://testnet.confluxscan.io'>https://testnet.confluxscan.io</a></td>
    </tr>
    <tr>
      <td><a href='https://evmapi-testnet.confluxscan.net/doc'>https://evmapi-testnet.confluxscan.net</a></td><td>Testnet eSpace</td><td>Production</td>
      <td><a target='_blank' href='https://evmtestnet.confluxscan.io'>https://evmtestnet.confluxscan.io</a></td>
    </tr>
  </table>
  Notes:<br/>
  <li>Timestamp is in seconds format.</li>
  <li>Maximum 'skip' is 10,000 when paging.</li>
  <li>Maximum 'limit' is 100 when paging.</li>
  "
  version: 0.0.1
servers:
  - url: ''
    description: 'This server'
paths:
  '/api?module=account&action=balance':
    get:
      tags:
        - 'Account'
      description: 'Get CFX Balance for a Single Address'
      parameters:
        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/tag'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Balance'
  '/api?module=account&action=balancemulti':
    get:
      tags:
        - 'Account'
      description: 'Get CFX Balance for Multiple Addresses in a Single Call'
      parameters:
        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/tag'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceMulti'
  '/api?module=account&action=txlist':
    get:
      tags:
        - 'Account'
      description: "Get a list of 'Normal' Transactions By Address"
      parameters:
        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/startblock'
        - $ref: '#/components/parameters/endblock'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/sort'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TxList'
  '/api?module=account&action=txlistinternal':
    get:
      tags:
        - 'Account'
      description: "Get a list of 'Internal' Transactions.
                    \nUsages:
                    \n1> Get 'Internal' Transactions by Address.
                    \n   example:
                    \n       https://evmapi.confluxscan.net/api
                    \n       ?module=account
                    \n       &action=txlistinternal
                    \n       &address=0x2c1ba59d6f58433fb1eaee7d20b26ed83bda51a3
                    \n       &startblock=0
                    \n       &endblock=2702578
                    \n       &page=1
                    \n       &offset=10
                    \n       &sort=asc
                    \n       &apikey=YourApiKeyToken
                    \n2> Get 'Internal Transactions' by Transaction Hash.
                    \n   example:
                    \n       https://evmapi.confluxscan.net/api
                    \n       ?module=account
                    \n       &action=txlistinternal
                    \n       &txhash=0x40eb908387324f2b575b4879cd9d7188f69c8fc9d87c901b9e2daaea4b442170
                    \n       &apikey=YourApiKeyToken
                    \n3> Get 'Internal Transactions' by Block Range.
                    \n   example:
                    \n       https://evmapi.confluxscan.net/api
                    \n       ?module=account
                    \n       &action=txlistinternal
                    \n       &startblock=13481773
                    \n       &endblock=13491773
                    \n       &page=1
                    \n       &offset=10
                    \n       &sort=asc
                    \n       &apikey=YourApiKeyToken"
      parameters:
        - $ref: '#/components/parameters/txhash'
        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/startblock'
        - $ref: '#/components/parameters/endblock'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/sort'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferCfxList'
  '/api?module=account&action=tokentx':
    get:
      tags:
        - 'Account'
      description: "Get a list of 'ERC20 - Token Transfer Events' by Address"
      parameters:
        - $ref: '#/components/parameters/contractaddress'
        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startblock'
        - $ref: '#/components/parameters/endblock'
        - $ref: '#/components/parameters/sort'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer20List'
  '/api?module=account&action=tokennfttx':
    get:
      tags:
        - 'Account'
      description: "Get a list of 'ERC721 - Token Transfer Events' by Address"
      parameters:
        - $ref: '#/components/parameters/contractaddress'
        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startblock'
        - $ref: '#/components/parameters/endblock'
        - $ref: '#/components/parameters/sort'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer721List'
  '/api?module=account&action=getminedblocks':
    get:
      tags:
        - 'Account'
      description: 'Get list of Blocks Mined by Address'
      parameters:
        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/blocktype'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/offset'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinedBlockList'
  '/api?module=account&action=balancehistory':
    get:
      tags:
        - 'Account'
      description: 'Get Historical Ether Balance for a Single Address By BlockNo'
      parameters:
        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/blockno'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceHistory'
  '/nft/balances':
    get:
      tags:
        - 'NFT Assets'
      description: "Get balances of NFT assets for account address."
      parameters:
        - $ref: '#/components/parameters/ownerParam'
        - $ref: '#/components/parameters/skipParamWithoutMaximum'
        - $ref: '#/components/parameters/limitParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/NFTBalanceList"
  '/nft/tokens':
    get:
      tags:
        - 'NFT Assets'
      description: "Get token id array of specified NFT contract for account address."
      parameters:
        - $ref: '#/components/parameters/ownerParam'
        - $ref: '#/components/parameters/contractParamMust'
        - $ref: '#/components/parameters/skipParamWithoutMaximum'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/detailParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/NFTTokenList"
  '/nft/preview':
    get:
      tags:
        - 'NFT Assets'
      description: "View the NFT for the specified contract address and tokenID."
      parameters:
        - $ref: '#/components/parameters/contractParamMust'
        - $ref: '#/components/parameters/tokenIdParamMust'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/NFTPreview"
  '/account/transactions':
    get:
      tags:
        - 'Account(Deprecated)'
      description: "Get transactions associated with an account. A transaction with 'from' or 'to' equals to specified account
        is considered as 'associate'. Parameters 'from' and 'to' are [or] logic."
      parameters:
        - $ref: '#/components/parameters/accountParam'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/fromParam'
        - $ref: '#/components/parameters/toParam'
        - $ref: '#/components/parameters/startBlockParam'
        - $ref: '#/components/parameters/endBlockParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/TransactionListResp"
  '/account/cfx/transfers':
    get:
      description: 'Get cfx transfer records of an account.'
      tags:
        - 'Account(Deprecated)'
      parameters:
        - $ref: '#/components/parameters/accountParam'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/fromParam'
        - $ref: '#/components/parameters/toParam'
        - $ref: '#/components/parameters/startBlockParam'
        - $ref: '#/components/parameters/endBlockParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer20ListResp"
  '/account/crc20/transfers':
    get:
      description: 'Get crc20 transfer records of an account.'
      tags:
        - 'Account(Deprecated)'
      parameters:
        - $ref: '#/components/parameters/accountParam'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/fromParam'
        - $ref: '#/components/parameters/toParam'
        - $ref: '#/components/parameters/startBlockParam'
        - $ref: '#/components/parameters/endBlockParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer20ListResp"
  '/account/crc721/transfers':
    description: 'Get crc721 transfer records of an account'
    get:
      tags:
        - 'Account(Deprecated)'
      parameters:
        - $ref: '#/components/parameters/accountParam'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/fromParam'
        - $ref: '#/components/parameters/toParam'
        - $ref: '#/components/parameters/startBlockParam'
        - $ref: '#/components/parameters/endBlockParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/tokenIdParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer721ListResp"
  '/account/crc1155/transfers':
    description: 'Get crc1155 transfer records of an account'
    get:
      tags:
        - 'Account(Deprecated)'
      parameters:
        - $ref: '#/components/parameters/accountParam'
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/contractParam'
        - $ref: '#/components/parameters/fromParam'
        - $ref: '#/components/parameters/toParam'
        - $ref: '#/components/parameters/startBlockParam'
        - $ref: '#/components/parameters/endBlockParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/tokenIdParam'
        - $ref: '#/components/parameters/sortParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Transfer1155ListResp"
  '/account/tokens':
    get:
      description: 'Get assets held by an account. Some tokens may not show up for some reasons.'
      tags:
        - 'Account(Deprecated)'
      parameters:
        - $ref: '#/components/parameters/accountParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/AssetsOfAccountResp"
components:
  schemas:
    Balance:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        result:
          type: string
    BalanceMulti:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        result:
          type: array
          items:
            properties:
              address:
                type: string
                description: 'Account address'
              balance:
                type: string
                description: 'Account balance'
    TxList:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        result:
          type: array
          items:
            properties:
              blockNumber:
                type: string
              timeStamp:
                type: string
              hash:
                type: string
              nonce:
                type: string
              blockHash:
                type: string
              transactionIndex:
                type: string
              from:
                type: string
              to:
                type: string
              value:
                type: string
              gas:
                type: string
              gasPrice:
                type: string
              isError:
                type: string
              txreceipt_status:
                type: string
              input:
                type: string
              contractAddress:
                type: string
              cumulativeGasUsed:
                type: string
              gasUsed:
                type: string
              confirmations:
                type: string
    TransferCfxList:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        result:
          type: array
          items:
            properties:
              blockNumber:
                type: string
              timeStamp:
                type: string
              hash:
                type: string
              from:
                type: string
              to:
                type: string
              value:
                type: string
              contractAddress:
                type: string
              input:
                type: string
              type:
                type: string
              traceId:
                type: string
              isError:
                type: string
              errCode:
                type: string
    Transfer20List:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        result:
          type: array
          items:
            properties:
              blockNumber:
                type: string
              timeStamp:
                type: string
              hash:
                type: string
              nonce:
                type: string
              blockHash:
                type: string
              from:
                type: string
              contractAddress:
                type: string
              to:
                type: string
              value:
                type: string
              tokenName:
                type: string
              tokenSymbol:
                type: string
              tokenDecimal:
                type: string
              transactionIndex:
                type: string
              gas:
                type: string
              gasPrice:
                type: string
              gasUsed:
                type: string
              cumulativeGasUsed:
                type: string
              input:
                type: string
                description: "deprecated"
              confirmations:
                type: string
    Transfer721List:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        result:
          type: array
          items:
            properties:
              blockNumber:
                type: string
              timeStamp:
                type: string
              hash:
                type: string
              nonce:
                type: string
              blockHash:
                type: string
              from:
                type: string
              contractAddress:
                type: string
              to:
                type: string
              value:
                type: string
              tokenName:
                type: string
              tokenSymbol:
                type: string
              tokenDecimal:
                type: string
              transactionIndex:
                type: string
              gas:
                type: string
              gasPrice:
                type: string
              gasUsed:
                type: string
              cumulativeGasUsed:
                type: string
              input:
                type: string
                description: "deprecated"
              confirmations:
                type: string
    MinedBlockList:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        result:
          type: array
          items:
            properties:
              blockNumber:
                type: string
                description: 'Block Number'
              timeStamp:
                type: string
                description: 'The timeStamp is represented in Unix timestamp'
              blockReward:
                type: string
                description: 'Block Reward'
    BalanceHistory:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        result:
          type: string
    NFTBalanceList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  contract:
                    description: 'Contract address of the token.'
                    type: string
                  balance:
                    description: "The token balance of an account, the string is not divided by the token decimal."
                    type: string
                  name:
                    description: 'Name of the token.'
                    type: string
                  symbol:
                    description: 'Symbol of the token.'
                    type: string
                  type:
                    description: 'The type of the token, and it may be CRC721/CRC1155.'
                    type: string
                  webSite:
                    description: 'The web site of the token.'
                    type: string
                  iconUrl:
                    description: 'Icon url.'
                    type: string
                    example: 'http://scan-icons.oss-cn-hongkong.aliyuncs.com/testnet/xxxxxx.svg'
    NFTTokenList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  contract:
                    description: 'Contract address of the token.'
                    type: string
                  tokenId:
                    description: "The token id."
                    type: string
                  name:
                    description: 'The name of NFT'
                    type: string
                  image:
                    description: 'The image uri of NFT'
                    type: string
                  description:
                    description: 'The description of NFT'
                    type: string
    NFTPreview:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            contract:
              description: 'Contract address of the token.'
              type: string
            tokenId:
              description: "The token id."
              type: string
            name:
              description: 'The name of NFT'
              type: string
            image:
              description: 'The image uri of NFT'
              type: string
            description:
              description: 'The description of NFT'
              type: string
    AddressInfo:
      type: object
      additionalProperties:
        type: object
        properties:
          name:
            type: string
          symbol:
            type: string
          iconUrl:
            type: string
          decimals:
            type: integer
          tokenType:
            type: string
    TransactionListResp:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  "blockPosition":
                    type: integer
                    description: "One epoch may have multiple blocks. It's the position of current block in all blocks."
                  "transactionIndex":
                    type: integer
                    description: "One block may have multiple transactions. It's the position of this transaction in all transactions."
                  "nonce":
                    type: integer
                  "hash":
                    description: 'transaction hash'
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "value":
                    type: string
                    description: 'Amount of cfx, in drip.'
                  "gasPrice":
                    type: string
                  "gasFee":
                    type: string
                  "timestamp":
                    description: "Timestamp in seconds. "
                    type: number
                  "status":
                    type: integer
                  "contractCreated":
                    type: string
                  "method":
                    type: string
                    description: 'method id or method name.'
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    TransferCfxListResp:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  from:
                    type: string
                  to:
                    type: string
                  amount:
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    Transfer20ListResp:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  from:
                    type: string
                  to:
                    type: string
                  amount:
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    Transfer721ListResp:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "tokenId":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    Transfer1155ListResp:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            list:
              type: array
              items:
                properties:
                  epochNumber:
                    type: integer
                  transactionHash:
                    type: string
                  "from":
                    type: string
                  "to":
                    type: string
                  "amount":
                    type: string
                  "tokenId":
                    type: string
                  timestamp:
                    type: integer
            addressInfo:
              $ref: '#/components/schemas/AddressInfo'
    AssetsOfAccountResp:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            list:
              type: array
              items:
                properties:
                  name:
                    description: 'Name of the token.'
                    type: string
                  symbol:
                    description: 'Symbol of the token.'
                    type: string
                    example: 'ERC20'
                  decimals:
                    description: 'Decimal of the token, optional.'
                    type: integer
                  contract:
                    description: 'Contract address of the token.'
                    type: string
                  iconUrl:
                    description: 'Icon url.'
                    type: string
                    example: 'http://scan-icons.oss-cn-hongkong.aliyuncs.com/testnet/xxxxxx.svg'
                  amount:
                    description: 'The token balance of an account, the string is not divided by the token decimal.'
                    type: 'string'
  parameters:
    address:
      name: address
      in: query
      description: "the string representing the address to check for balance"
      required: false
