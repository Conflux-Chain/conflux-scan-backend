  /statistics/supply:
    get:
      tags:
        - 'Statistics'
      description: "Return supply info about CFX on Conflux Network.
                      \ntotalIssued: Total issued balance in Drip,
                      \ntotalCirculating: Total circulating balance in Drip,
                      \ntotalStaking: Total staking balance in Drip,
                      \ntotalCollateral: Total collateral balance in Drip,
                      \nnullAddressBalance: Zero address's balance in Drip,
                      \ntwoYearUnlockBalance: Two year unlock address's balance in Drip,
                      \nfourYearUnlockBalance: Four year unlock address's balance in Drip."
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketStat'
  /statistics/mining:
    get:
      tags:
        - 'Statistics'
      description: "Get statistics of mining within ${limit} ${intervalType}.
                   \nWhen intervalType is min, the maximum interval between minTimestamp and maxTimestamp is 60 minutes"
      parameters:
        - description: "Indicator calculation period, should be one of min(minute), hour or day. Default is hour."
          name: intervalType
          in: query
          required: false
          schema:
            type: string
            default: hour
            enum:
              - min
              - hour
              - day
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortByDefaultDescParam'
        - $ref: '#/components/parameters/skipParamWithoutMaximum'
        - name: limit
          in: query
          description: "The number of records displayed on the page. The maximum value is 60 when the intervalType is min, and 100 when the intervalType is hour/day."
          required: false
          schema:
            type: integer
            maximum: 100
            default: 10
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/MiningStat"
  /statistics/tps:
