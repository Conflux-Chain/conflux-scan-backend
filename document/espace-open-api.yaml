      responses:
        '200':
          description: Cursor-paginated verified contracts list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationListByCursor'
  '/contract/verified/latest':
    get:
      tags:
        - Contracts
      description: >
        Returns a filter-paginated list of verified contracts.
      parameters:
        - in: query
          name: compiler
          description: "Contract compiler (solc or vyper) "
          required: false
          schema:
            type: string
        - in: query
          name: contractName
          description: "The contract name"
          required: false
          schema:
            type: string
        - in: query
          name: compilerVersion
          description: "Compiler version used
                        \nfor solc compiler, such as v0.8.24+commit.e11b9ed9
                        \nfor vyper compiler, such as vyper:0.4.0"
          required: false
          schema:
            type: string
        - in: query
          name: licenseType
          description: "Valid codes 1-14 where
                              1.  No License (None)
                              2.  The Unlicense (Unlicense)
                              3. 	MIT License (MIT)
                              4. 	GNU General Public License v2.0 (GNU GPLv2)
                              5. 	GNU General Public License v3.0 (GNU GPLv3)
                              6. 	GNU Lesser General Public License v2.1 (GNU LGPLv2.1)
                              7. 	GNU Lesser General Public License v3.0 (GNU LGPLv3)
                              8. 	BSD 2-clause 'Simplified' license (BSD-2-Clause)
                              9. 	BSD 3-clause 'New' Or 'Revised' license* (BSD-3-Clause)
                              10. Mozilla Public License 2.0 (MPL-2.0)
                              11. Open Software License 3.0 (OSL-3.0)
                              12. Apache 2.0 (Apache-2.0)
                              13. GNU Affero General Public License (GNU AGPLv3)
                              14. Business Source License (BSL 1.1)"
          required: false
          schema:
            type: string
        - in: query
          name: contractAddress
          description: "The contract address"
          required: false
          schema:
            type: string
        - in: query
          name: deployerAddress
          description: "The contract deployer address"
          required: false
          schema:
            type: string
        - in: query
          description: "If the contract has nametag, the value is true/false."
          name: hasNametag
          required: false
          schema:
            type: string
        - in: query
          description: "The field used for sorting. The value is verified_time or txn_volume"
          name: sortField
          required: false
          schema:
            type: string
            default: 'verified_time'
        - $ref: '#/components/parameters/startBlockParam'
        - $ref: '#/components/parameters/endBlockParam'
        - $ref: '#/components/parameters/minTimestampParam'
        - $ref: '#/components/parameters/maxTimestampParam'
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/skipParamWithoutMaximum'
        - $ref: '#/components/parameters/limitParam'
      responses:
        '200':
          description: Filter-paginated verified contracts list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationListByFilter'
  '/contract/lookupAbi':
    get:
      tags:
        - Contracts
      description: Look up one or more function, error or event signatures by hash.
      parameters:
        - in: query
          name: function
          description: A comma-delimited list of function or error hashes with leading 0x prefix. Must be exactly 10 characters (0x + 8 hex chars). Supports up to 100 hashes at a time.
          required: false
          schema:
            type: string
        - in: query
          name: error
          description: A comma-delimited list of function or error hashes with leading 0x prefix. Must be exactly 10 characters (0x + 8 hex chars). Supports up to 100 hashes at a time.
          required: false
          schema:
            type: string
        - in: query
          name: event
          description: A comma-delimited list of event hashes with leading 0x prefix. Must be exactly 66 characters (0x + 64 hex chars). Supports up to 100 hashes at a time.
          required: false
          schema:
            type: string
      responses:
        200:
          description: The resulting signatures
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  result:
                    $ref: "#/components/schemas/SignatureResponse"
              examples:
                successful_lookup:
                  $ref: "#/components/examples/SignatureSearchResults"
  '/contract/searchAbi':
    get:
      tags:
        - Contracts
      description: Search signatures by name (case sensitive) with wildcards, limited to the first 100 unordered results per type.
      parameters:
        - in: query
          name: signature
          description: The signature of the function, error or event to search for. Case sensitive. Use '*' and '?' for wildcards.
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/signatureTypeParam'
      responses:
        200:
          description: The resulting signatures
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  result:
                    $ref: "#/components/schemas/SignatureResponse"
              examples:
                successful_lookup:
                  $ref: "#/components/examples/SignatureSearchResults"
