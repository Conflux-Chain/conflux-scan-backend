      description: "If suppress error when withBrief and/or withMetadata is set to true to parse metadata, the value is true/false."
      name: suppressMetadataError
      in: query
      required: false
      schema:
        type: string
        default: 'false'
    startBlockParam:
      name: startBlock
      in: query
      required: false
      schema:
        type: integer
    endBlockParam:
      name: endBlock
      in: query
      required: false
      schema:
        type: integer
    spanParam:
      description: "Calculates the ranking in the specified time span 24h, 3d or 7d. If not provided, default value is 24h"
      name: spanType
      in: query
      required: false
      schema:
        type: string
        default: '24h'
    hashesParam:
      description: "Hash array of transactions to decode data, separated by comma,
          eg. 0x8378892767d0afce19b278015702531a61512e8444ee7f51c41c90e56fec462d,0xa09c63d8dc9867851b254b31a723e653c9608a94a4a61bc97bf8a5f4aeffb4f4"
      name: hashes
      in: query
      required: true
      schema:
        type: string
    contractsParam:
      description: "To address array of transactions to decode data, separated by comma,
        eg. 0xc18944582317654327f20ce92df111cae83995dd,0x30b987679c1dcf3a8c890395eadf178078a99b82"
      name: contracts
      in: query
      required: true
      schema:
        type: string
    inputsParam:
      description: "To input data array of transactions to decode data, separated by comma,
        eg. 0xaea1414f,0x6e756fb200000000000000000000000015a0a156ce9feb9f01881b3b4a9788c49e65c6fa00000000000000000000000000000000000000000000"
      name: inputs
      in: query
      required: true
      schema:
        type: string
    nameParamMust:
      description: "The name attribute contained in nft metadata"
      name: name
      in: query
      required: true
      schema:
        type: string
    transferTypeParam:
      description: "Query the transfer record of the address based on the specified transferType which includes
                              1. Transaction
                                \n\t1.1 'transaction'
                              2. CFX Transfer
                                \n\t2.1 'call'
                                \n\t2.2 'create'
                              3. Token Transfer
                                \n\t3.1 'transfer_20'
                                \n\t3.2 'transfer_721'
                                \n\t3.3 'transfer_1155'"
      name: transferType
      in: query
      required: false
      schema:
        type: string
