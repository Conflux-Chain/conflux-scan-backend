  /eip7702/auths:
    get:
      tags:
        - 'EIP'
      description: "Retrieves EIP-7702 authorizations. Supports filtering by author, delegated contract address, 
      and transaction sender. These parameters are combined using AND logic. 
      The candidate data set comprises all authorization records on the chain."
      parameters:
        - name: author
          in: query
          required: false
          description: "Address of the authorization signer/author."
          schema:
            type: string
        - name: address
          in: query
          required: false
          description: "Address of the delegated contract."
          schema:
            type: string
        - name: txSender
          in: query
          required: false
          description: "Address of the transaction sender."
          schema:
            type: string
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Auth7702"
  /eip4337/bundle-txs:
    get:
      tags:
        - 'EIP'
      description: |
        Returns a paginated list of EIP-4337 bundle transactions. Each bundle transaction is a
        regular on-chain transaction submitted by a bundler to an EntryPoint contract, containing
        one or more UserOperations (AA transactions).

        Results can be filtered by bundler address and/or EntryPoint address (filters are combined with AND logic).
        Results are ordered by epoch descending (newest first).

        Each item includes the bundle hash, status (success/failure), transaction fee, value, number of
        included UserOperations, failed UserOperation count, the called EntryPoint method, and the
        execution error message (if the bundle failed).
      parameters:
        - name: bundler
          in: query
          required: false
          description: "Filter by bundler address (the EOA that submitted the bundle to the EntryPoint)."
          schema:
            type: string
        - name: entryPoint
          in: query
          required: false
          description: "Filter by EntryPoint contract address."
          schema:
            type: string
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/BundleTxResponse"
  /eip4337/aa-txs:
    get:
      tags:
        - 'EIP'
      description: |
        Returns a paginated list of EIP-4337 UserOperation (AA) transactions. Each record represents
        a single UserOperation that was bundled into a bundle transaction and executed via an EntryPoint
        contract.

        Results can be filtered by sender (smart account address), bundler address, and/or EntryPoint
        address (filters are combined with AND logic). Results are ordered by epoch descending (newest first).

        Each item includes the user operation hash, execution success status, gas cost, methods called
        (both the EIP-4337 inner call method and the EIP-7702 delegation method if applicable),
        and the failure reason if the operation did not succeed.
      parameters:
        - name: sender
          in: query
          required: false
          description: "Filter by sender address (the smart contract account that initiated the UserOperation)."
          schema:
            type: string
        - name: bundler
          in: query
          required: false
          description: "Filter by bundler address (the EOA that submitted the bundle to the EntryPoint)."
          schema:
            type: string
        - name: entryPoint
          in: query
          required: false
          description: "Filter by EntryPoint contract address."
          schema:
            type: string
        - $ref: '#/components/parameters/skipParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/AATxResponse"
  /eip4337/aa-tx:
    get:
      tags:
        - 'EIP'
      description: |
        Returns the detail of a single EIP-4337 UserOperation (AA) transaction by its user operation hash.

        Returns all fields from `AATxItem` (same as items in `/eip4337/aa-txs`) plus extra fields
        from `AATxDetailExtra` — parsed live from the bundle tx: data (user op callData),
        position, verificationGasLimit, preVerificationGas, maxFeePerGas, maxPriorityFeePerGas,
        signature, txGasLimit, txGasUsed. Returns `null` if not found.
      parameters:
        - name: userOpHash
          in: query
          required: true
          description: "User operation hash (0x-prefixed, 64 hex characters)."
          schema:
            type: string
            pattern: '^0x[a-fA-F0-9]{64}$'
            example: "0xabcfa8a60f7cc55ce51b321ada3135b9e79fd0a3b74b782f79bb818d10b08c9a"
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/AATxDetailResponse"
  /eip4337/bundle-tx:
    get:
      tags:
        - 'EIP'
      description: |
        Parse a single EIP-4337 bundle transaction by hash and return the breakdown of
        all UserOperations it contains.

        The response includes bundle-level metadata (bundler, entryPoint, status, fee,
        block number, timestamp) and a list of per-user-op details parsed live from the
        transaction input data and receipt event logs.

        Each user op item includes: the user operation hash, the EIP-7702 execution
        method, its zero-based position within the bundle, the sender (smart account)
        address, ERC-20 token transfer count, NFT transfer count, gas fee paid, call
        gas limit, success status, nonce, and paymaster address.

        Returns an error if the transaction is not found or is not a recognised 4337
        bundle transaction.
      parameters:
        - name: txHash
          in: query
          required: true
          description: "Transaction hash of the bundle (0x-prefixed, 64 hex characters)."
          schema:
            type: string
            pattern: '^0x[a-fA-F0-9]{64}$'
            example: "0x7cdb4307680f46e75b4280d5424eb1002b3e3feadaa70543b4f11791c2006332"
      responses:
        200:
          description: ''
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/BundleTxDetailResponse"
  /data/accounts:
    get:
      tags:
        - 'data'
      description: "Get accounts on the blockchain."
      parameters:
        - $ref: '#/components/parameters/idCursor'
