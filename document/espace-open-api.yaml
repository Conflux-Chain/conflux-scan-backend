openapi: 3.0.0
info:
  title: Conflux Scan Open Api
  description: "Use any http client to fetch data from the ConfluxScan mainnet or testnet.<br/>
  <h3>Endpoints:</h3>
  <table>
    <tr>
      <td>API Host</td><td>Net</td><td>Mode</td><td>Scan</td>
    </tr>
    <tr>
      <td><a href='https://api.confluxscan.__tld__/doc'>https://api.confluxscan.__tld__</a></td><td>Mainnet Core</td><td>Production</td>
      <td><a target='_blank' href='https://confluxscan.__tld__'>https://confluxscan.__tld__</a></td>
    </tr>
    <tr>
      <td><a href='https://evmapi.confluxscan.__tld__/doc'>https://evmapi.confluxscan.__tld__</a></td><td>Mainnet eSpace</td><td>Production</td>
      <td><a target='_blank' href='https://evm.confluxscan.__tld__'>https://evm.confluxscan.__tld__</a></td>
    </tr>
    <tr>
      <td><a href='https://api-testnet.confluxscan.__tld__/doc'>https://api-testnet.confluxscan.__tld__</a></td><td>Testnet Core</td><td>Production</td>
      <td><a target='_blank' href='https://testnet.confluxscan.__tld__'>https://testnet.confluxscan.__tld__</a></td>
    </tr>
    <tr>
      <td><a href='https://evmapi-testnet.confluxscan.__tld__/doc'>https://evmapi-testnet.confluxscan.__tld__</a></td><td>Testnet eSpace</td><td>Production</td>
      <td><a target='_blank' href='https://evmtestnet.confluxscan.__tld__'>https://evmtestnet.confluxscan.__tld__</a></td>
    </tr>
  </table>
  
  <h3>Notes:</h3>
  <li>Timestamp is in seconds format.</li>
  <li>Maximum 'skip' is 10,000 when paging.</li>
  <li>Maximum 'limit' is 100 when paging.</li>
  <li>The block list, transaction list, CFX transfer list and token transfer list  querying by account dimension can only be viewed the last 20,000 records due to data prune.</li>
  
  <h3>Rate Limit:</h3>
  Reference for various API tiers and their rate limits
  <table>
    <tr>
    <td>API Tier</td>
    <td>Price</td>
    <td>Rate Limit</td>
    </tr>
    <tr>
    <td>Free</td>
    <td>$0</td>
    <td>5 calls/second, up to 100,000 calls/day</td>
    </tr>
    <tr>
    <td>Standard</td>
    <td>$150/mo</td>
    <td>20 calls/second, up to 500,000 calls/day</td>
    </tr>
    <tr>
    <td>Enterprise</td>
    <td>For details, please email bd@confluxnetwork.org</td>
    <td>Customize according to demand</td>
    </tr>
  </table>
  
  <h3>SDK:</h3>
  <table>
    <tr>
    <td>Space</td>
    <td>Link</td>
    </tr>
    <tr>
    <td>Core</td>
    <td><a target='_blank' href='https://www.npmjs.com/package/@conflux-lib/openapi-sdk-core'>openapi-sdk-core</a></td>
    </tr>
    <tr>
    <td>EVM</td>
    <td><a target='_blank' href='https://www.npmjs.com/package/@conflux-lib/openapi-sdk-evm'>openapi-sdk-evm</a></td>
    </tr>
  </table>
  "
  version: 0.0.1
servers:
  - url: ''
    description: 'This server'
paths:
  '/api?module=account&action=balance':
    get:
      tags:
        - 'Accounts - Etherscan compatible'
      description: 'Get CFX Balance for a Single Address'
      parameters:
        - $ref: '#/components/parameters/addressMust'
        - $ref: '#/components/parameters/tag'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'
  '/api?module=account&action=balancemulti':
    get:
      tags:
        - 'Accounts - Etherscan compatible'
      description: 'Get CFX Balance for Multiple Addresses in a Single Call'
      parameters:
        - $ref: '#/components/parameters/addressMust'
        - $ref: '#/components/parameters/tag'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceMulti'
  '/api?module=account&action=txlist':
    get:
      tags:
        - 'Accounts - Etherscan compatible'
      description: "Get a list of 'Normal' Transactions By Address"
      parameters:
        - $ref: '#/components/parameters/addressMust'
        - $ref: '#/components/parameters/startblock'
        - $ref: '#/components/parameters/endblock'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/sort'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TxList'
  '/api?module=account&action=txlistinternal':
    get:
      tags:
        - 'Accounts - Etherscan compatible'
      description: "Get a list of 'Internal' Transactions.
                    \nUsage:
                    \n1> Get 'Internal' Transactions by Address.
                    \n   example:
                    \n       https://evmapi.confluxscan.net/api
                    \n       ?module=account
                    \n       &action=txlistinternal
                    \n       &address=0x2c1ba59d6f58433fb1eaee7d20b26ed83bda51a3
                    \n       &startblock=0
                    \n       &endblock=2702578
                    \n       &page=1
                    \n       &offset=10
                    \n       &sort=asc
                    \n       &apikey=YourApiKeyToken
                    \n2> Get 'Internal Transactions' by Transaction Hash.
                    \n   example:
                    \n       https://evmapi.confluxscan.net/api
                    \n       ?module=account
                    \n       &action=txlistinternal
                    \n       &txhash=0x40eb908387324f2b575b4879cd9d7188f69c8fc9d87c901b9e2daaea4b442170
                    \n       &apikey=YourApiKeyToken
                    \n3> Get 'Internal Transactions' by Block Range.
                    \n   example:
                    \n       https://evmapi.confluxscan.net/api
                    \n       ?module=account
                    \n       &action=txlistinternal
                    \n       &startblock=13481773
                    \n       &endblock=13491773
                    \n       &page=1
                    \n       &offset=10
                    \n       &sort=asc
                    \n       &apikey=YourApiKeyToken"
      parameters:
        - $ref: '#/components/parameters/txhash'
        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/startblock'
        - $ref: '#/components/parameters/endblock'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/sort'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferCfxList'
  '/api?module=account&action=tokentx':
    get:
      tags:
        - 'Accounts - Etherscan compatible'
      description: "Get a list of 'ERC20 - Token Transfer Events' by Address
                    \nUsage:
                    \n1> ERC-20 transfers from an address, specify the address parameter
                    \n2> ERC-20 transfers from a contract address, specify the contract address parameter
                    \n3> ERC-20 transfers from an address filtered by a token contract, specify both address and contract address parameters."
      parameters:
        - $ref: '#/components/parameters/contractaddress'
        - $ref: '#/components/parameters/address'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startblock'
        - $ref: '#/components/parameters/endblock'
        - $ref: '#/components/parameters/sort'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer20List'
  '/api?module=account&action=tokennfttx':
    get:
      tags:
        - 'Accounts - Etherscan compatible'
      description: "Get a list of 'ERC721 - Token Transfer Events' by Address
                    \nUsage:
