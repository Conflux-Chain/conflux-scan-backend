openapi: 3.0.0
info:
  title: Conflux Scan Open Api
  description: "Use any http client to fetch data from the ConfluxScan mainnet or testnet.<br/>
  <table>
    <tr>
      <td>Api host</td><td>Net</td><td>Mode</td><td>Scan</td>
    </tr>
    <tr>
      <td><a href='https://api.confluxscan.net/doc'>https://api.confluxscan.net</a></td><td>Mainnet Core</td><td>Production</td>
      <td><a target='_blank' href='https://confluxscan.io'>https://confluxscan.io</a></td>
    </tr>
    <tr>
      <td><a href='https://evmapi.confluxscan.net/doc'>https://evmapi.confluxscan.net</a></td><td>Mainnet eSpace</td><td>Production</td>
      <td><a target='_blank' href='https://evm.confluxscan.io'>https://evm.confluxscan.io</a></td>
    </tr>
    <tr>
      <td><a href='https://api-testnet.confluxscan.net/doc'>https://api-testnet.confluxscan.net</a></td><td>Testnet Core</td><td>Production</td>
      <td><a target='_blank' href='https://testnet.confluxscan.io'>https://testnet.confluxscan.io</a></td>
    </tr>
    <tr>
      <td><a href='https://evmapi-testnet.confluxscan.net/doc'>https://evmapi-testnet.confluxscan.net</a></td><td>Testnet eSpace</td><td>Production</td>
      <td><a target='_blank' href='https://evmtestnet.confluxscan.io'>https://evmtestnet.confluxscan.io</a></td>
    </tr>
  </table>
  Notes:<br/>
  <li>Timestamp is in seconds format.</li>
  <li>Maximum 'skip' is 10,000 when paging.</li>
  <li>Maximum 'limit' is 100 when paging.</li>
  "
  version: 0.0.1
servers:
  - url: ''
    description: 'This server'
paths:
  '/api?module=account&action=balance':
    get:
      tags:
        - 'Accounts'
      description: 'Get CFX Balance for a Single Address'
      parameters:
        - $ref: '#/components/parameters/addressMust'
        - $ref: '#/components/parameters/tag'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'
  '/api?module=account&action=balancemulti':
    get:
      tags:
        - 'Accounts'
      description: 'Get CFX Balance for Multiple Addresses in a Single Call'
      parameters:
        - $ref: '#/components/parameters/addressMust'
        - $ref: '#/components/parameters/tag'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceMulti'
  '/api?module=account&action=txlist':
    get:
      tags:
        - 'Accounts'
      description: "Get a list of 'Normal' Transactions By Address"
      parameters:
        - $ref: '#/components/parameters/addressMust'
        - $ref: '#/components/parameters/startblock'
        - $ref: '#/components/parameters/endblock'
