version: "3"

services:
  api:
    image: node:14.7.0
    volumes:
      - ./:/scan
      - ./log/api:/log
      - ./data/api:/data
    network_mode: host
    restart: always
    command: node /scan/scan-api

  compiler:
    image: node:14.7.0
    volumes:
      - ./:/scan
      - ./log/compiler:/log
      - ./data/compiler:/cache
    network_mode: host
    restart: always
    command: node /scan/scan-compiler
  stat:
    image: node:14.7.0
    volumes:
      - ./:/stat-root
      - ./log/:/log
    network_mode: host
    environment:
      PORT: 8087
    restart: always
    command: node /stat-root/stat/dist/Index.js
  block:
    image: node:14.7.0
    network_mode: host
    restart: always
    volumes:
      - ./:/stat-root
    command: node /stat-root/stat/dist/FullBlockSync.js
  stream:
    image: node:14.7.0
    network_mode: host
    restart: always
    volumes:
      - ./:/stat-root
    command: node /stat-root/stat/dist/StreamSync.js
  cfxCounterHolderMarker:
    image: node:14.7.0
    network_mode: host
    restart: always
    volumes:
      - ./:/stat-root
    command: node /stat-root/stat/dist/CfxTransferSync.js cfxCounterHolderMarker
  bill:
    image: node:14.7.0
    network_mode: host
    restart: always
    volumes:
      - ./:/stat-root
    command: node /stat-root/stat/dist/service/watcher/DummyNode.js 1
  pos-not-ready:
    image: node:14.7.0
    network_mode: host
    restart: always
    volumes:
      - ./:/stat-root
    command: node /stat-root/stat/dist/service/pos/PosSync.js http://192.168.8.165:12537 345000