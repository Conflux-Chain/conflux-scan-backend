#version: "3"

services:
  api:
    image: scan:latest
    command: npm run api
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./stat/config/Prod.js:/scan/stat/config/Prod.js
      - ./scan-api/config/local.js:/scan/scan-api/config/local.js
      - ./log/api:/scan/log
      - ./cache:/scan/cache
  open_api:
    image: scan:latest
    command: npm run open_api
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./stat/config/Prod.js:/scan/stat/config/Prod.js
      - ./log:/scan/log
      - ./cache:/scan/cache
  compiler:
    image: scan:latest
    command: npm run compiler
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./log/compiler:/scan/log
      - ./cache:/scan/cache
