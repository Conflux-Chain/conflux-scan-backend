    image: scan:latest
    command: npm run token_transfer
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./stat/config/Prod.js:/scan/stat/config/Prod.js
      - ./log:/scan/log
      - ./cache:/scan/cache
  token_x: # token misc: holder, total supply; T3525; approval sync;
    image: scan:latest
    command: npm run token_x
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./stat/config/Prod.js:/scan/stat/config/Prod.js
      - ./log:/scan/log
      - ./cache:/scan/cache
  cfx_transfer: # cfx transfer sync
    image: scan:latest
    command: npm run cfx_transfer
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./stat/config/Prod.js:/scan/stat/config/Prod.js
      - ./log:/scan/log
      - ./cache:/scan/cache
  pos:
    image: scan:latest
