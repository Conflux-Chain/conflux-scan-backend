version: "3"

services:
  stat:
    image: node:14.7.0
    volumes:
      - ./:/stat-root
      - ./log/:/log
    network_mode: host
    environment:
      PORT: 8087
    restart: always
    command: node /stat-root/stat/dist/Index.js
  block:
    image: node:14.7.0
    network_mode: host
    restart: always
    volumes:
      - ./:/stat-root
    command: node /stat-root/stat/dist/FullBlockSync.js
  stream:
    image: node:14.7.0
    network_mode: host
    restart: always
    volumes:
      - ./:/stat-root
    command: node /stat-root/stat/dist/StreamSync.js
  bill:
    image: node:14.7.0
      network_mode: host
      restart: always
      volumes:
        - ./:/stat-root
      command: node /stat-root/stat/dist/service/watcher/DummyNode.js 1